<div
  id="ds-modal"
  *ngIf="isShown"
  class="fixed inset-0 z-[1001]"
  [ngClass]="[className]"
>
  <!-- Backdrop -->
  <div
    class="popup-overlay"
    [ngClass]="theme.overlay"
    (click)="onBackdropClick($event)"
  ></div>

  <!-- Modal panel -->
  <div class="absolute" [ngClass]="[theme.base]">
    <div
      [ngClass]="[
        theme.panel,
        'animate-fadeInScale',
        !description && !(secondaryAction || mainAction)
          ? 'items-center'
          : 'items-start'
      ]"
    >
      <button (click)="onClose()" class="absolute top-2 right-2">
        <ds-icon id="close" size="24px"></ds-icon>
      </button>
      <div
        *ngIf="icon"
        class="flex items-center justify-center p-2 rounded-full"
        [ngClass]="
          type === 'success'
            ? 'bg-green-100'
            : type === 'warning'
              ? 'bg-amber-100'
              : type === 'error'
                ? 'bg-red-100'
                : 'bg-blue-100'
        "
      >
        <ds-icon
          [id]="icon"
          size="1.25rem"
          [ngClass]="
            type === 'success'
              ? 'text-green-500'
              : type === 'warning'
                ? 'text-amber-500'
                : type === 'error'
                  ? 'text-red-500'
                  : 'text-blue-500'
          "
        ></ds-icon>
      </div>
      <div class="mr-3">
        <h2 *ngIf="title" class="text-[1.25rem]/[1.5rem] font-bold">
          {{ title }}
        </h2>
        <p *ngIf="description" class="text-neutral-500 text-sm mt-1">
          {{ description }}
        </p>
        <div
          #contentContainer
          class="mt-4"
          [class.hidden]="!hasProjectedContent"
        >
          <ng-content></ng-content>
        </div>
        <div
          *ngIf="secondaryAction || mainAction"
          class="flex items-center justify-start gap-2 mt-4"
        >
          <ds-button
            *ngIf="secondaryAction"
            variant="secondary"
            size="small"
            (click)="onSecondaryActionOnClick()"
            class="text-neutral-500 text-sm"
          >
            {{ secondaryAction }}
          </ds-button>
          <ds-button
            *ngIf="mainAction"
            variant="primary"
            size="small"
            (click)="onMainActionOnClick()"
            class="text-primary-500 text-sm"
          >
            {{ mainAction }}
          </ds-button>
        </div>
      </div>
    </div>
  </div>
</div>
