<div id="ds-virement-card" [ngClass]="[className, 'bg-level-5 rounded p-4']">
  <div *ngIf="mode === 'view'" class="flex flex-col gap-y-2">
    <div class="flex justify-between items-start">
      <div class="flex flex-col gap-y-2">
        <p class="text-xs font-medium text-neutral-900">
          {{ beneficiaryName }}
        </p>
        <p class="text-xs font-bold text-neutral-900">
          {{ beneficiaryAccountNumber }}
        </p>
      </div>
      <div class="flex gap-x-2">
        <button (click)="toggleEditMode()">
          <ds-icon id="edit-contained-1" size="16"></ds-icon>
        </button>
        <button (click)="handleDelete()">
          <ds-icon id="trash-02" size="16"></ds-icon>
        </button>
      </div>
    </div>
    <div class="flex justify-between items-center">
      <div class="flex flex-col gap-y-0.5">
        <p class="text-xs text-neutral-500">Motif</p>
        <p class="text-xs font-bold text-neutral-900">
          {{ motif }}
        </p>
      </div>
      <div class="flex flex-col items-end gap-y-0.5">
        <p class="text-xs text-neutral-500">Montant</p>
        <ds-balance-formatter
          [balance]="amount?.amount"
          [currency]="amount?.currency"
          [noIcon]="true"
        ></ds-balance-formatter>
      </div>
    </div>
  </div>
  <div *ngIf="mode === 'edit'" class="flex flex-col gap-y-2">
    <div class="flex justify-between items-start">
      <div class="flex flex-col gap-y-2">
        <p class="text-xs font-medium text-neutral-900">
          {{ beneficiaryName }}
        </p>
        <p class="text-xs font-bold text-neutral-900">
          {{ beneficiaryAccountNumber }}
        </p>
      </div>
      <div class="flex gap-x-2">
        <button (click)="toggleViewMode()">
          <ds-icon id="close-square" size="16" class="text-error-500"></ds-icon>
        </button>
        <button (click)="handleSave()">
          <ds-icon
            id="tick-circle"
            size="18"
            class="text-success-500"
          ></ds-icon>
        </button>
      </div>
    </div>
    <div class="flex justify-between items-center gap-x-2">
      <ds-input
        [label]="'Motif'"
        [value]="motifValue"
        (onInput)="motifValue = $event.target.value"
        class="flex-1"
        placeholder="Saisir le motif"
      ></ds-input>
      <ds-input
        [label]="'Montant'"
        [value]="amountValue"
        (onInput)="amountValue = $event.target.value"
        class="flex-1"
        placeholder="Saisir le montant"
      ></ds-input>
    </div>
  </div>
</div>
