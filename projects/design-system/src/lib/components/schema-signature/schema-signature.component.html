<div id="ds-schema-signature" [ngClass]="['bg-level-3 rounded p-4', className]">
  <h2 class="text-xs text-neutral-900 mb-4" *ngIf="title">{{ title }}</h2>
  <div class="flex justify-between items-center">
    <div class="flex flex-col gap-y-0.5">
      <p class="text-xs font-bold text-neutral-900">
        {{ initiation.actionAgent.name }}
      </p>
      <p class="text-xs text-neutral-500">{{ initiation.actionAgent.role }}</p>
    </div>
    <div class="flex flex-col items-end gap-y-0.5">
      <p class="text-xs text-neutral-500">{{ initiation.actionLabel }}</p>
      <p class="text-xs font-bold text-neutral-900">
        {{ initiation.actionDate }}
      </p>
    </div>
  </div>
  <hr class="border-neutral-50 my-2.5" />
  <ng-container *ngFor="let action of actions; let index = index">
    <div class="flex justify-between items-center">
      <div class="flex flex-col gap-y-0.5">
        <p class="text-xs font-bold text-neutral-900">
          {{ initiation.actionAgent.name }}
        </p>
        <p class="text-xs text-neutral-500">
          {{ initiation.actionAgent.role }}
        </p>
      </div>
      <div class="flex flex-col items-end gap-y-0.5">
        <p class="text-xs text-neutral-500">{{ initiation.actionLabel }}</p>
        <p class="text-xs font-bold text-neutral-900">
          {{ initiation.actionDate }}
        </p>
      </div>
    </div>
    <div
      class="h-3 w-px bg-neutral-200 ml-3 my-2"
      *ngIf="index !== actions.length - 1"
    ></div>
  </ng-container>
</div>
