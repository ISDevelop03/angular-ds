<div
  id="ds-generic-list"
  [ngClass]="['bg-level-3 flex flex-col gap-4 p-4 rounded', className]"
>
  <div *ngFor="let item of items" class="flex flex-col gap-y-4">
    <ng-container *ngIf="item.type === 'text'">
      <div class="flex items-center justify-between">
        <p class="text-neutral-900 font-medium text-[0.725rem]/[1rem]">
          {{ item.label }}
        </p>
        <p class="text-neutral-900 font-bold text-[0.875rem]/[1.125rem]">
          {{ item.value }}
        </p>
      </div>
    </ng-container>
    <ng-container *ngIf="item.type === 'list-badges'">
      <div class="flex items-center justify-between">
        <p class="text-neutral-900 font-medium text-[0.725rem]/[1rem]">
          {{ item.label }}
        </p>
        <div class="flex flex-wrap gap-1 items-center">
          <ds-badge
            size="sm"
            *ngFor="let value of item.value"
            [label]="value"
          ></ds-badge>
        </div>
      </div>
    </ng-container>
    <ng-container *ngIf="item.type === 'account'">
      <div class="flex items-center justify-between">
        <p class="text-neutral-900 font-medium text-[0.725rem]/[1rem]">
          {{ item.label }}
        </p>
        <div class="flex flex-col items-end gap-y-0.5">
          <p class="text-neutral-900 font-bold text-[0.875rem]/[1.125rem]">
            {{ item.value.accountName }}
          </p>
          <p class="text-neutral-500 text-[0.875rem]/[1.125rem]">
            {{ item.value.accountNumber }}
          </p>
        </div>
      </div>
    </ng-container>
  </div>
</div>
