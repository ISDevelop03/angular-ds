<div id="ds-file-uploader">
  <div
    [ngClass]="[
      currentTheme.wrapper,
      className,
      disabled ? '!cursor-not-allowed opacity-40' : ''
    ]"
    (drop)="onDrop($event)"
    (dragover)="onDragOver($event)"
    (click)="openFileInput()"
  >
    <div [ngClass]="currentTheme.icon">
      <ds-icon id="upload-cloud" size="30px" class="text-red-500"></ds-icon>
    </div>

    <div [ngClass]="[currentTheme.text]" class="relative">
      <input
        #fileInput
        type="file"
        [accept]="'.' + allowedExtensions.join(',.')"
        class="absolute inset-0 opacity-0 cursor-pointer z-[-1000]"
        (change)="onFileChange($event)"
        [multiple]="isMultiple"
      />
      <ng-content></ng-content>
    </div>
  </div>
  <div class="mt-2">
    <ds-file-list
      [files]="files"
      [isMultiple]="isMultiple"
      (onDelete)="removeFile($event)"
      (onDownloadErrors)="downloadErrors($event)"
      [maxHeight]="maxHeight"
      [showErrorButtonUpload]="showErrorButtonUpload"
    ></ds-file-list>
  </div>

  <ds-modal
    [isShown]="isErrorModalShown"
    title="Upload error"
    type="error"
    icon="danger"
    mainAction="OK"
    (close)="closeErrorModal()"
    (mainActionOnClick)="closeErrorModal()"
  >
    <ul class="list-disc pl-4 text-neutral-500 text-sm">
      <li *ngFor="let error of errorMessages">{{ error }}</li>
    </ul>
  </ds-modal>
</div>
