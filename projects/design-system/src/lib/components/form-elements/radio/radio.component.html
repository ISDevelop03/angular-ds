<label id="ds-radio" class="cursor-pointer inline-block">
  <div [ngClass]="wrapperClass">
    <div
      [ngClass]="[
        radio[variant].base,
        disabled
          ? checked
            ? radio[variant].disabled.checked
            : radio[variant].disabled.unchecked
          : checked
            ? radio[variant].enabled.checked
            : radio[variant].enabled.unchecked
      ]"
    >
      <input
        type="radio"
        class="absolute size-0 opacity-0"
        [value]="value"
        [checked]="modelValue === value"
        (change)="onInputChange()"
        [name]="name"
        [disabled]="disabled"
      />
      <div
        [ngClass]="[
          radio[variant].icon.base,
          disabled
            ? checked
              ? radio[variant].icon.disabled.checked
              : radio[variant].icon.disabled.unchecked
            : checked
              ? radio[variant].icon.enabled.checked
              : radio[variant].icon.enabled.unchecked
        ]"
      ></div>
    </div>

    <span *ngIf="label" [ngClass]="[radio[variant].label.base, labelClass]">
      {{ label }}
    </span>
  </div>

  <ng-container *ngIf="hasError && errorMessage">
    <span class="text-error-500 text-[0.875rem]/normal">{{
      errorMessage
    }}</span>
  </ng-container>
</label>
