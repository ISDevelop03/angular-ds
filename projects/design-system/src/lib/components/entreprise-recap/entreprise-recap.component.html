<div
  id="ds-entreprise-recap"
  [ngClass]="['bg-level-5 flex flex-col gap-2 rounded p-4', className]"
>
  <div
    *ngFor="let item of items"
    class="flex justify-between items-center gap-1"
  >
    <p class="text-sm font-medium text-neutral-900">{{ item.label }}</p>
    <div
      *ngIf="isScalarValue(item.value)"
      class="text-sm font-bold text-neutral-900"
    >
      {{ item.value }}
    </div>
    <ng-container *ngIf="asAccount(item.value) as account">
      <div class="flex flex-col items-end">
        <div class="text-sm font-bold text-neutral-900">
          {{ account.account_type }}
        </div>
        <div class="text-sm text-neutral-500">
          {{ account.account_number }}
        </div>
      </div>
    </ng-container>
  </div>
</div>
